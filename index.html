<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL - আলটিমেট ভিডিও হাব</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        body { 
            background: #090d16;
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            padding: 40px 20px;
            position: relative;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
            filter: brightness(1.1) contrast(1.05);
        }

        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(9, 13, 22, 0.3) 0%, rgba(15, 23, 42, 0.4) 100%);
            z-index: -1;
        }

        .container { 
            width: 100%; max-width: 700px; 
            background: transparent; padding: 20px 10px; text-align: center; 
            animation: containerSpawn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }

        .logo-wrapper {
            position: relative; width: 100px; height: 100px; margin: 0 auto 20px;
        }

        .profile-logo {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); background: #1e293b;
        }

        .logo-wrapper::before {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%; background: linear-gradient(45deg, #06b6d4, #6366f1, #d946ef);
            background-size: 200% 200%; animation: gradientRotate 4s linear infinite; z-index: -1;
        }

        h1 { 
            font-size: 32px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; text-shadow: 0 2px 10px rgba(0, 242, 254, 0.3);
        }

        .subtitle {
            color: #cbd5e1; font-size: 13px; margin-top: 6px; margin-bottom: 25px;
            text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .search-box-container { position: relative; margin-bottom: 30px; }

        .search-input {
            width: 100%; padding: 14px 20px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 14px;
            color: #fff; font-size: 15px; outline: none; transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            background: rgba(0, 0, 0, 0.6);
        }

        .links-wrapper { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; 
            max-height: 550px; overflow-y: auto; padding-right: 5px; text-align: left;
        }

        @media (max-width: 500px) { .links-wrapper { grid-template-columns: 1fr; } }

        .links-wrapper::-webkit-scrollbar { width: 5px; }
        .links-wrapper::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }

        .link-card { 
            display: block; background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            text-decoration: none; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden;
        }

        .video-thumbnail {
            width: 100%; height: 150px; object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.3s ease;
            background: #111a2e;
        }

        .video-title {
            padding: 12px 15px; font-weight: 600; font-size: 15px; color: #f1f5f9; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .link-card:hover { transform: translateY(-5px); border-color: #06b6d4; box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3); }
        .link-card:hover .video-thumbnail { transform: scale(1.03); }
        .link-card:hover .video-title { color: #00f2fe; }

        .no-results { display: none; color: #94a3b8; font-size: 14px; margin-top: 10px; }

        @keyframes containerSpawn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes gradientRotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>
    
    <div class="video-overlay"></div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="Logo" class="profile-logo" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=LOL';">
        </div>

        <h1>LOL</h1>
        <p class="subtitle">Secure Video Dashboard</p>
        
        <div class="search-box-container">
            <input type="text" id="searchBar" class="search-input" placeholder="ভিডিও খুঁজুন..." onkeyup="searchLinks()">
        </div>

        <div class="links-wrapper" id="linksContainer"></div>
        
        <p id="notFound" class="no-results">কোনো ভিডিও পাওয়া যায়নি!</p>
    </div>

    <script>
        // START_LINKS
        const videoLinks = [
            "https://xhamster.com/videos/boob-suck-of-ex-girl-11479059",
            "https://www.wikipedia.org"
        ];
        // END_LINKS

        const container = document.getElementById('linksContainer');

        videoLinks.forEach(url => {
            const card = document.createElement('a');
            card.href = url;
            card.target = "_blank";
            card.className = "link-card";
            
            card.innerHTML = `
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" class="video-thumbnail">
                <div class="video-title">লোডিং...</div>
            `;
            container.appendChild(card);

            fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`)
                .then(res => res.json())
                .then(response => {
                    if(response.status === 'success') {
                        const data = response.data;
                        const title = data.title || "ভিডিও লিংক";
                        const image = (data.image && data.image.url) || (data.screenshot && data.screenshot.url) || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500";
                        
                        card.querySelector('.video-thumbnail').src = image;
                        card.querySelector('.video-title').innerText = title;
                    } else {
                        card.querySelector('.video-title').innerText = url.split('/')[2] || "ভিডিও লিংক";
                    }
                })
                .catch(() => {
                    card.querySelector('.video-title').innerText = url.split('/')[2] || "ভিডিও লিংক";
                });
        });

        function searchLinks() {
            const input = document.getElementById('searchBar').value.toLowerCase();
            const links = document.getElementsByClassName('link-card');
            const notFound = document.getElementById('notFound');
            let hasResults = false;

            for (let i = 0; i < links.length; i++) {
                const linkText = links[i].querySelector('.video-title').innerText.toLowerCase();
                if (linkText.includes(input)) {
                    links[i].style.display = "block";
                    hasResults = true;
                } else {
                    links[i].style.display = "none";
                }
            }

            notFound.style.display = hasResults ? "none" : "block";
        }
    </script>
</body>
</html>
